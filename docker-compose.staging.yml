services:
  frontend:
    image: ${IMAGE_REF}
    container_name: oct-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      # SSR depuis le conteneur : le backend est sur la machine hôte (port 8000 publié)
      GRAPHQL_ENDPOINT: ${GRAPHQL_ENDPOINT:-http://host.docker.internal:8000/graphql}
      NEXT_PUBLIC_MERCURE_HUB_URL: ${NEXT_PUBLIC_MERCURE_HUB_URL:-http://localhost:8080/.well-known/mercure}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
