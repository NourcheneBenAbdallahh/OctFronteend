name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    # Exclure "closed" : au merge, GitHub envoie aussi un push sur main → évite 2 exécutions
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      deploy_local:
        description: "Déployer sur la machine locale (runner self-hosted Windows)"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint (ESLint on changed files)
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "No valid base SHA found, linting all source files."
            npm run lint
            exit 0
          fi

          CHANGED_RAW=$(git diff --name-only --diff-filter=d "$BASE_SHA" "$HEAD_SHA" -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.mjs')

          EXISTING_FILES=()
          while IFS= read -r file; do
            if [[ -n "$file" && -f "$file" ]]; then
              EXISTING_FILES+=("$file")
            fi
          done <<< "$CHANGED_RAW"

          if [[ ${#EXISTING_FILES[@]} -eq 0 ]]; then
            echo "No changed source files to lint. Skipping ESLint."
            exit 0
          fi

          echo "Linting changed files:"
          printf '%s\n' "${EXISTING_FILES[@]}"
          npx eslint "${EXISTING_FILES[@]}"

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [quality]
    outputs:
      image_ref: ${{ steps.image_ref.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker tags
        id: image_vars
        shell: bash
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REF_SAFE=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "ref_safe=$REF_SAFE" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        id: docker_build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_GRAPHQL_ENDPOINT=${{ vars.NEXT_PUBLIC_GRAPHQL_ENDPOINT || 'http://192.168.125.1:8000/graphql' }}
            NEXT_PUBLIC_MERCURE_HUB_URL=${{ vars.NEXT_PUBLIC_MERCURE_HUB_URL || '' }}
          tags: |
            ghcr.io/${{ steps.image_vars.outputs.owner_lc }}/oct-frontend:${{ github.sha }}
            ghcr.io/${{ steps.image_vars.outputs.owner_lc }}/oct-frontend:${{ steps.image_vars.outputs.ref_safe }}

      - name: Export image ref
        id: image_ref
        run: echo "value=ghcr.io/${{ steps.image_vars.outputs.owner_lc }}/oct-frontend:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  unit_tests:
    name: unit_tests
    runs-on: ubuntu-latest
    needs: [quality, build]

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        shell: bash
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee coverage.txt
          test -f coverage/lcov.info || { echo "::error::coverage/lcov.info manquant après Vitest"; exit 1; }
          test -f sonar-report.xml || { echo "::error::sonar-report.xml manquant après Vitest"; exit 1; }

      - name: Publish coverage summary
        run: node scripts/ci-coverage-summary.js

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-coverage
          path: |
            coverage/lcov.info
            coverage/coverage-final.json
            coverage.txt
            sonar-report.xml

  sonar:
    name: sonar
    runs-on: ubuntu-latest
    needs: [unit_tests]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-coverage

      - name: Verify coverage reports for SonarCloud
        shell: bash
        run: |
          test -f coverage/lcov.info || { echo "::error::coverage/lcov.info manquant"; exit 1; }
          test -f sonar-report.xml || { echo "::error::sonar-report.xml manquant"; exit 1; }
          echo "Rapports de couverture prêts pour SonarCloud."

      - name: Validate SonarCloud token
        shell: bash
        run: |
          if [[ -z "${{ secrets.SONAR_TOKEN }}" ]]; then
            echo "::error::Secret SONAR_TOKEN manquant (SonarCloud → My Account → Security → Generate Token)."
            exit 1
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@bfd4e558cda28cda6b5defafb9232d191be8c203 # v4.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  integration_tests:
    name: integration_tests
    runs-on: ubuntu-latest
    needs: [unit_tests, build]

    steps:
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image and smoke test
        run: |
          docker pull "${{ needs.build.outputs.image_ref }}"
          docker run --rm "${{ needs.build.outputs.image_ref }}" node -v

  deploy_staging:
    name: deploy_local_machine
    runs-on: [self-hosted, Windows, X64]
    needs: [integration_tests, build]
    if: >
      github.event_name != 'pull_request' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.deploy_local == true))
    environment:
      name: local
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare .env.staging
        shell: powershell
        env:
          ENV_STAGING_SECRET: ${{ secrets.ENV_STAGING }}
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path -LiteralPath ".env.staging") {
            Write-Host ".env.staging already present in workspace."
            exit 0
          }
          if (-not [string]::IsNullOrWhiteSpace($env:ENV_STAGING_SECRET)) {
            $path = Join-Path (Get-Location) ".env.staging"
            $utf8NoBom = New-Object System.Text.UTF8Encoding $false
            [System.IO.File]::WriteAllText($path, $env:ENV_STAGING_SECRET, $utf8NoBom)
            Write-Host "Wrote .env.staging from GitHub Actions secret ENV_STAGING."
            exit 0
          }
          $copyFrom = @(
            (Join-Path (Join-Path $env:ProgramData "OctFrontend") ".env.staging")
            (Join-Path (Join-Path $env:LOCALAPPDATA "OctFrontend") ".env.staging")
            (Join-Path $env:USERPROFILE ".oct-frontend.env.staging")
          )
          foreach ($src in $copyFrom) {
            if (Test-Path -LiteralPath $src) {
              Copy-Item -LiteralPath $src -Destination ".env.staging"
              Write-Host "Copied .env.staging from $src"
              exit 0
            }
          }
          Write-Host "Cannot deploy: missing .env.staging."
          Write-Host 'Option A - GitHub secret ENV_STAGING with the full .env.staging file content (include GRAPHQL_ENDPOINT=http://host.docker.internal:8000/graphql).'
          Write-Host 'Option B - On this runner, copy .env.staging once to one of these paths:'
          Write-Host ('  - {0}' -f $copyFrom[0])
          Write-Host ('  - {0}' -f $copyFrom[1])
          Write-Host ('  - {0}' -f $copyFrom[2])
          exit 1

      - name: Deploy with Docker Compose on local machine
        env:
          IMAGE_REF: ${{ needs.build.outputs.image_ref }}
        run: |
          docker compose --env-file .env.staging -f docker-compose.staging.yml pull
          docker compose --env-file .env.staging -f docker-compose.staging.yml up -d --remove-orphans
          docker compose --env-file .env.staging -f docker-compose.staging.yml ps
